            { question: "What is 'plagiarism'?", options: ["Citing your sources correctly", "Using someone else's work, ideas, or words without proper attribution", "Writing in a unique style", "Paraphrasing carefully"], answer: 1 },
            { question: "In academic writing, which verb tense is used to describe research findings?", options: ["Simple future", "Simple present or simple past depending on convention and discipline", "Present continuous", "Past perfect continuously"], answer: 1 },
            { question: "What is a 'literature review'?", options: ["A review of newly published novels", "A critical survey of existing published research relevant to a topic", "A section about the author's reading history", "A bibliography section"], answer: 1 },
            { question: "What is 'triangulation' in research methodology?", options: ["A geometric proof", "Using multiple methods, sources, or perspectives to increase the validity or depth of findings", "A type of statistical test", "Drawing triangles in a diagram"], answer: 1 },
            { question: "What distinguishes 'qualitative' from 'quantitative' research?", options: ["Qualitative uses numbers; quantitative uses words", "Qualitative uses non-numerical data and meanings; quantitative uses measurable, numerical data", "There is no difference", "Quantitative only uses interviews"], answer: 1 },
            { question: "What is 'operationalization' in research?", options: ["Making an operation efficient", "The process of defining abstract concepts in measurable, observable terms", "Organizing the operations of a business", "A type of mathematical operation"], answer: 1 },
            { question: "In academic writing, what is an 'annotated bibliography'?", options: ["A list of sources with no comment", "A list of sources each accompanied by a brief descriptive and evaluative note", "An automatic reference list", "A draft bibliography"], answer: 1 },
            { question: "What is the difference between 'paraphrase' and 'summarize'?", options: ["No difference", "Paraphrase restates one specific passage in your own words; summarize condenses the main ideas of a longer text", "Paraphrase is longer than summarize; both use your own words", "Summarize is word-for-word while paraphrase changes meaning"], answer: 1 },
            { question: "What is 'critical analysis' in academic work?", options: ["Criticizing an author personally", "Evaluating the strengths and weaknesses of an argument or text through careful examination", "Writing a negative review", "Analyzing grammar only"], answer: 1 },
            { question: "What is an 'argumentative essay' structure?", options: ["Title, story, conclusion", "Introduction with thesis, body paragraphs with claim-evidence-explanation, and conclusion", "Summary, quotations, bibliography", "Introduction, narration, digression"], answer: 1 },
            { question: "What does 'ad absurdum' mean in academic argument?", options: ["A valid and strong argument", "Reducing an argument to its absurd logical conclusion to disprove it (reductio ad absurdum)", "A Latin proverb", "A form of ethical appeal"], answer: 1 },
            { question: "What is 'academic integrity'?", options: ["Writing only in formal language", "Honest and ethical conduct in academic work, including avoiding plagiarism, cheating, and falsification", "Getting high grades", "Writing without errors"], answer: 1 },
            { question: "What is the purpose of a 'conclusion' in an academic essay?", options: ["Introduce new ideas and arguments", "Synthesize key points, restate the thesis in light of the argument, and signal wider significance — without introducing new ideas", "List all references used", "Copy the introduction in different words"], answer: 1 },
            { question: "What does 'interdisciplinary' mean in academic research?", options: ["Working within a single field", "Combining approaches and insights from two or more academic disciplines", "The study of international issues", "Research published across many countries"], answer: 1 }
        ];

        questionBank[99] = [ // Pre-Legend Test
            { question: "Which sentence uses 'whom' correctly?", options: ["Whom shall I say is calling?", "To whom it may concern.", "Whom did the award went to?", "Whom came to the party?"], answer: 1 },
            { question: "Choose the sentence without an error:", options: ["Between you and I, this has gone too far.", "Between you and me, this has gone too far.", "Between you and myself, this has gone too far.", "Between I and you, this has gone too far."], answer: 1 },
            { question: "What does 'sui generis' mean?", options: ["Self-destructive", "Unique in its characteristics; in a class by itself", "Related to genetics", "A rule of law"], answer: 1 },
            { question: "'Not only did she win the race, but she also broke the record.' This is an example of:", options: ["A conditional sentence", "Inversion for emphasis", "A cleft sentence", "An adverbial clause only"], answer: 1 },
            { question: "What does 'Pyrrhic victory' mean?", options: ["A total and complete win", "A win obtained at too great a cost to be worthwhile", "A victory in battle", "An unexpected win"], answer: 1 },
            { question: "Choose the correctly structured sentence:", options: ["She is the kind of person who gives their best.", "She is the kind of person that gives their best.", "She is the kind of person that gives her best.", "She is the kind of person who gives her best."], answer: 3 },
            { question: "What rhetorical device is used: 'The world will little note, nor long remember what we say here'?", options: ["Hyperbole", "Litotes", "Irony", "Antithesis"], answer: 1 },
            { question: "What does 'zeitgeist' mean?", options: ["A hostile foreign invader", "The defining spirit or mood of a particular period of history", "A sudden breakthrough", "A philosophical paradox"], answer: 1 },
            { question: "Correct the sentence: 'The data shows that innovation are the key to growth.'", options: ["'data shows' and 'are' are both wrong: 'data show' or 'The data shows...and is the key'", "'data shows' → 'data show'; 'are' → 'is'", "The sentence is correct", "'innovation are' is acceptable in informal contexts"], answer: 1 },
            { question: "What does 'obfuscate' mean?", options: ["To clarify and enlighten", "To render obscure, unclear, or unintelligible", "To improve dramatically", "To offend greatly"], answer: 1 },
            { question: "Which is the correct use of 'fewer' vs. 'less'?", options: ["Fewer water; less people", "Less water; fewer people", "Less water; less people", "Fewer water; fewer people"], answer: 1 },
            { question: "What does 'scintillating' mean?", options: ["Dull and lifeless", "Sparklingly brilliant and lively; fascinating", "Extremely scientific", "Ancient and classical"], answer: 1 },
            { question: "What is an 'oxymoron'?", options: ["A figure of speech using an impossible comparison", "A figure of speech that combines two contradictory terms (e.g., 'deafening silence')", "An extreme exaggeration", "A type of metaphor using animals"], answer: 1 },
            { question: "'The definition of insanity is doing the same thing over and over and expecting different results.' What fallacy might this statement represent in academic discourse?", options: ["An appeal to emotion", "A misattributed or apocryphal quotation used as an appeal to false authority", "A valid scientific theorem", "Circular reasoning"], answer: 1 },
            { question: "What does 'lassitude' mean?", options: ["Energetic enthusiasm", "Physical or mental weariness; lack of energy", "A light breeze", "Precise attention to detail"], answer: 1 },
            { question: "What is the 'narrative fallacy'?", options: ["Writing a bad story", "The human tendency to construct coherent stories to explain random or complex events", "An illogical plot", "A type of unreliable narrator"], answer: 1 },
            { question: "What does 'erstwhile' mean?", options: ["For a long time still", "Former; past; of a previous time", "Immediately", "Somehow or other"], answer: 1 },
            { question: "What is 'apophasis' as a rhetorical device?", options: ["Directly praising something at length", "Mentioning something by claiming not to mention it ('I won't mention his criminal record...')", "A type of logical proof", "Extended metaphor over a long passage"], answer: 1 },
            { question: "What does 'tendentious' prose mean?", options: ["Completely objective writing", "Writing that promotes a particular cause or point of view, often unfairly biased", "Writing about tendons or medicine", "Academic prose without examples"], answer: 1 },
            { question: "FINAL PREP QUESTION: Which sentence is completely free of error?", options: ["Whoever you invite, ensure that they arriving on time.", "Whomever you invite, ensure that they arrive on time.", "However you invite, ensure that they arrive on time.", "Whoever you invite, ensure that they arrives on time."], answer: 1 }
        ];

        questionBank[100] = [ // 🏆 LEGEND LEVEL 100 — THE ULTIMATE TEST
            { question: "LEVEL 100 BEGINS! What does 'apocryphal' mean?", options: ["Widely attributed but probably not true or authentic", "Ancient and verified", "Extremely rare and valuable", "Of divine or supernatural origin"], answer: 0 },
            { question: "What does 'conflate' mean?", options: ["To separate clearly", "To combine two or more texts, ideas, or concepts into one, often inappropriately", "To inflate with confidence", "To contradict directly"], answer: 1 },
            { question: "What does 'atavistic' mean?", options: ["Relating to avant-garde art", "Relating to a throwback to an ancestral or evolutionary past", "Extremely advanced", "Relating to childhood memories"], answer: 1 },
            { question: "Identify the correct sentence:", options: ["It is I who is responsible.", "It is I who am responsible.", "It is me who is responsible.", "It is me who are responsible."], answer: 1 },
            { question: "What does 'tendentious' mean in scholarly discourse?", options: ["Fair and balanced", "Promoting a particular point of view with bias", "Relating to medical tendons", "Long and meandering"], answer: 1 },
            { question: "What does 'interlocutor' mean?", options: ["A legal interpreter", "A person who takes part in a dialogue or conversation", "An inter-cultural mediator", "A type of moderator in debate competitions only"], answer: 1 },
            { question: "What is the 'Dunning-Kruger effect'?", options: ["A type of learning disability", "The cognitive bias where people with limited knowledge overestimate their own competence", "A linguistic theory about grammar", "A sociological model of group behavior"], answer: 1 },
            { question: "What does 'venal' mean?", options: ["Morally pure and uncorrupted", "Susceptible to bribery; open to corrupt influences", "Relating to blood vessels", "Extremely intellectual"], answer: 1 },
            { question: "'Had I known, I would have acted differently.' This grammatical structure is:", options: ["Second conditional", "Third conditional with inverted 'had' (replacing 'If I had known')", "Mixed conditional", "A subjunctive in the present"], answer: 1 },
            { question: "What does 'internecine' mean?", options: ["Between two different countries", "Destructive to both sides of a conflict; mutually devastating", "Internal communication within an organization", "A type of international law"], answer: 1 },
            { question: "What does 'fungible' mean?", options: ["Relating to fungi or mushrooms", "Interchangeable; able to replace or be replaced by something identical", "Easily broken down", "Chemically unstable"], answer: 1 },
            { question: "What does 'sophistry' mean?", options: ["Genuine philosophical wisdom", "The use of clever but false arguments; intentionally deceptive reasoning", "A field of philosophy about wisdom", "Scientific methodology"], answer: 1 },
            { question: "Choose the most elegant and grammatically precise sentence:", options: ["Between him and I, the situation became awkward quickly.", "Between him and me, the situation quickly became awkward.", "Between he and me, the situation became awkward quickly.", "The situation became awkward between he and I quickly."], answer: 1 },
            { question: "What does 'concatenation' mean?", options: ["A type of logical fallacy", "A series of linked elements; the action of linking things in a chain", "A grammatical error in complex sentences", "The study of cause and effect"], answer: 1 },
            { question: "What does 'lacuna' mean?", options: ["A bright area", "A gap or missing portion in a text, argument, or theory", "A small lake", "A type of logical proof"], answer: 1 },
            { question: "What is 'apophenia'?", options: ["A type of language disorder", "The tendency to perceive meaningful patterns or connections in unrelated things", "A philosophical argument for God's existence", "A linguistic phenomenon in ancient texts"], answer: 1 },
            { question: "What does 'weltanschauung' mean?", options: ["A type of German cuisine", "A comprehensive world view; a particular philosophy or conception of the world", "The study of world languages", "An old-fashioned perspective"], answer: 1 },
            { question: "What is the 'observer effect' in research?", options: ["The effect of weather on observations", "The phenomenon where the act of observation changes what is being observed", "A type of confirmation bias", "The use of observers in clinical studies"], answer: 1 },
            { question: "What does 'heuristic' mean?", options: ["A strict scientific rule", "Enabling a person to discover or learn something for themselves; a practical approach to problem-solving that is not guaranteed to be perfect", "A type of fallacy", "An ancient Greek measurement"], answer: 1 },
            { question: "🏆 CONGRATULATIONS — LEGEND LEVEL 100 COMPLETE! What does 'acme' mean?", options: ["The lowest point of something difficult", "The point at which someone or something is best, perfect, or most successful; the peak", "A type of skin condition only", "An ancient measurement of land area"], answer: 1 }
        ];

        // =================================================================

        // Get questions for current level (fallback to level 1 if not found)
        const questions = questionBank[level] || questionBank[1];
        let currentQuestion = 0;
        let userAnswers = Array(questions.length).fill(null);
        const startTime = Date.now();

        // Background Music Setup
        const bgMusic = document.getElementById('bgMusic');
        if (bgMusic) bgMusic.volume = 1.0; // Volume 100%

        // Play audio on first user interaction to bypass browser autoplay policies
        const playMusic = () => {
            if (bgMusic.paused) {
                bgMusic.play().catch(e => console.log('Autoplay prevented', e));
            }
            document.body.removeEventListener('click', playMusic);
        };
        document.body.addEventListener('click', playMusic);

        // DOM references
        const qEl = document.getElementById('question');
        const optEl = document.getElementById('options');
        const counter = document.getElementById('counter');
        const progressBar = document.getElementById('progressBar');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const navGrid = document.getElementById('navGrid');

        // Set level title and emoji
        document.getElementById('levelTitle').textContent = levelTitles[level] || `Level ${level}`;
        document.getElementById('levelEmoji').textContent = levelEmojis[level] || 'ðŸ“š';

        // Gacha items state
        window.used5050 = {};
        document.getElementById('count5050').textContent = parseInt(localStorage.getItem('item_5050')) || 0;
        document.getElementById('countTime').textContent = parseInt(localStorage.getItem('item_time')) || 0;
        document.getElementById('countFreeze').textContent = parseInt(localStorage.getItem('item_freeze')) || 0;

        // ===== TIMER STATE =====
        const TOTAL_TIME = 20 * 60; // 20 minutes in seconds
        let timeLeft = TOTAL_TIME;
        let timerInterval = null;
        let timerFrozen = false;

        function formatTime(secs) {
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function updateTimerDisplay() {
            const wrap = document.getElementById('timerWrap');
            const display = document.getElementById('timerDisplay');
            display.textContent = formatTime(timeLeft);
            // Update state classes
            wrap.classList.remove('warning', 'danger', 'frozen');
            if (timerFrozen) {
                wrap.classList.add('frozen');
            } else if (timeLeft <= 120) {
                wrap.classList.add('danger');
            } else if (timeLeft <= 300) {
                wrap.classList.add('warning');
            }
        }

        function startTimer() {
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                if (!timerFrozen) {
                    timeLeft--;
                    updateTimerDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        timeLeft = 0;
                        updateTimerDisplay();
                        // Show alert then auto-submit
                        setTimeout(() => {
                            alert('⏰ Waktu habis! Quiz akan diselesaikan secara otomatis.');
                            showResults();
                        }, 200);
                    }
                }
            }, 1000);
        }
        // ========================

        function useItem(type) {
            let key = '';
            if (type === '5050') key = 'item_5050';
            else if (type === 'time') key = 'item_time';
            else if (type === 'freeze') key = 'item_freeze';

            let qty = parseInt(localStorage.getItem(key)) || 0;
            if (qty <= 0) { alert('Bantuan tidak tersedia! Dapatkan dari Gift di halaman utama.'); return; }

            if (type === '5050') {
                // Remove two wrong options
                const q = questions[currentQuestion];
                const correctIdx = q.answer;
                const wrongIdxs = [0, 1, 2, 3].filter(i => i !== correctIdx);
                const toHide = wrongIdxs.sort(() => Math.random() - 0.5).slice(0, 2);
                window.used5050[currentQuestion] = toHide;
                qty--;
                localStorage.setItem(key, qty);
                document.getElementById('count5050').textContent = qty;
                loadQuestion();
            } else if (type === 'time') {
                // Add 60 seconds to timer
                timeLeft = Math.min(timeLeft + 60, TOTAL_TIME);
                updateTimerDisplay();
                // Show floating +60s toast
                showToast('⏳ +60 detik ditambahkan!', '#f59e0b');
                qty--;
                localStorage.setItem(key, qty);
                document.getElementById('countTime').textContent = qty;
            } else if (type === 'freeze') {
                // Freeze timer for 15 seconds
                if (timerFrozen) { alert('Timer sudah dibekukan!'); return; }
                timerFrozen = true;
                updateTimerDisplay();
                showToast('❄️ Timer dibekukan 15 detik!', '#06b6d4');
                qty--;
                localStorage.setItem(key, qty);
                document.getElementById('countFreeze').textContent = qty;
                setTimeout(() => {
                    timerFrozen = false;
                    updateTimerDisplay();
                    showToast('❄️ Freeze selesai!', '#06b6d4');
                }, 15000);
            }
        }

        function showToast(msg, color) {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.cssText = `
                position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-20px);
                background: ${color}22; border: 1px solid ${color}; color: ${color};
                font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1rem;
                padding: 12px 28px; border-radius: 50px; backdrop-filter: blur(10px);
                box-shadow: 0 8px 24px ${color}44; z-index: 9999;
                transition: all 0.4s cubic-bezier(0.16,1,0.3,1); opacity: 0;
            `;
            document.body.appendChild(toast);
            requestAnimationFrame(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translateX(-50%) translateY(0)';
            });
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(-20px)';
                setTimeout(() => toast.remove(), 400);
            }, 2500);
        }
        // ============================================

        function initNavGrid() {
            navGrid.innerHTML = '';
            for (let i = 0; i < questions.length; i++) {
                const btn = document.createElement('div');
                btn.className = 'nav-number';
                btn.textContent = i + 1;
                btn.onclick = () => goToQuestion(i);
                navGrid.appendChild(btn);
            }
        }

        function updateNavGrid() {
            const navButtons = navGrid.children;
            for (let i = 0; i < questions.length; i++) {
                navButtons[i].className = 'nav-number';
                if (i === currentQuestion) {
                    navButtons[i].classList.add('current');
                } else if (userAnswers[i] !== null) {
                    navButtons[i].classList.add('answered');
                }
            }
        }

        function goToQuestion(index) {
            currentQuestion = index;
            loadQuestion();
        }

        function navigateQuestion(direction) {
            const newIndex = currentQuestion + direction;
            if (newIndex >= 0 && newIndex < questions.length) {
                currentQuestion = newIndex;
                loadQuestion();
            }
        }

        function loadQuestion() {
            const q = questions[currentQuestion];
            qEl.innerText = q.question;
            optEl.innerHTML = "";
            counter.innerText = `Soal ${currentQuestion + 1} / ${questions.length}`;

            const answeredCount = userAnswers.filter(a => a !== null).length;
            progressBar.style.width = (answeredCount / questions.length) * 100 + "%";

            q.options.forEach((opt, i) => {
                const div = document.createElement("div");
                div.className = "option";
                if (userAnswers[currentQuestion] === i) {
                    div.classList.add("selected");
                }

                // Apply 50:50 if it was used on this question
                if (window.used5050[currentQuestion] && window.used5050[currentQuestion].includes(i)) {
                    div.style.opacity = '0.3';
                    div.style.pointerEvents = 'none';
                }

                div.innerText = opt;
                div.onclick = () => selectAnswer(div, i);
                optEl.appendChild(div);
            });

            updateNavGrid();
            prevBtn.disabled = currentQuestion === 0;
            nextBtn.disabled = currentQuestion === questions.length - 1;
        }

        function selectAnswer(el, selectedIndex) {
            document.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
            el.classList.add("selected");
            userAnswers[currentQuestion] = selectedIndex;
            updateNavGrid();
            const answeredCount = userAnswers.filter(a => a !== null).length;
            progressBar.style.width = (answeredCount / questions.length) * 100 + "%";
        }

        function finishQuiz() {
            const answeredCount = userAnswers.filter(a => a !== null).length;
            if (answeredCount < questions.length) {
                const unanswered = questions.length - answeredCount; if (!confirm(`Kamu
            masih memiliki ${unanswered} soal yang belum dijawab. Yakin ingin menyelesaikan quiz?`)) { return; }
            }
            showResults();
        }

        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = ['#667eea', '#764ba2', '#f093fb', '#f5576c'][Math.floor(Math.random() * 4)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function showResults() {
            // Stop the timer when showing results
            if (timerInterval) clearInterval(timerInterval);
            const endTime = Date.now();
            const totalTime = Math.floor((endTime - startTime) / 1000);
            const minutes = Math.floor(totalTime / 60);
            const seconds = totalTime % 60;

            let correctAnswers = 0;
            let wrongAnswers = 0;
            let unanswered = 0;

            userAnswers.forEach((answer, index) => {
                if (answer === null) {
                    unanswered++;
                } else if (answer === questions[index].answer) {
                    correctAnswers++;
                } else {
                    wrongAnswers++;
                }
            });

            const score = correctAnswers * 5;
            const totalQuestions = questions.length;
            const percentage = Math.round((correctAnswers / totalQuestions) * 100);

            // ============== SAVE TO LOCALSTORAGE ==============
            const currentTotalScore = parseInt(localStorage.getItem('totalScore')) || 0;
            const newTotalScore = currentTotalScore + score;
            localStorage.setItem('totalScore', newTotalScore);

            const currentCompleted = parseInt(localStorage.getItem('completedLessons')) || 0;
            const newCompleted = currentCompleted + correctAnswers;
            localStorage.setItem('completedLessons', newCompleted);

            localStorage.setItem(`level_${level}_completed`, 'true');
            localStorage.setItem(`level_${level}_percentage`, percentage);
            localStorage.setItem(`level_${level}_score`, score);
            localStorage.setItem(`level_${level}_time`, totalTime);

            // Simpan riwayat jawaban salah untuk fitur pembahasan
            let wrongQuestionsData = [];
            userAnswers.forEach((answer, index) => {
                if (answer !== null && answer !== questions[index].answer) {
                    wrongQuestionsData.push({
                        level: level,
                        question: questions[index].question,
                        userAnswer: questions[index].options[answer],
                        correctAnswer: questions[index].options[questions[index].answer],
                        options: questions[index].options,
                        timestamp: Date.now()
                    });
                }
            });
            // Ambil histori lama, kecualikan level yang sama agar data terupdate, max 100 history
            let existingWrongAnswers = JSON.parse(localStorage.getItem('wrongAnswersHistory')) || [];
            existingWrongAnswers = existingWrongAnswers.filter(wa => wa.level !== level);
            existingWrongAnswers = [...wrongQuestionsData, ...existingWrongAnswers].slice(0, 100);
            localStorage.setItem('wrongAnswersHistory', JSON.stringify(existingWrongAnswers));

            console.log('✅ Data saved! Total Score:', newTotalScore, 'Level', level, '-', percentage + '%');
            // ==================================================

            // Stop background music on quiz finish
            if (bgMusic) bgMusic.pause();

            let predicate = "";
            let emoji = "";
            if (percentage >= 90) {
                predicate = "Sempurna!";
                emoji = "🎖️";
                createConfetti();
            } else if (percentage >= 85) {
                predicate = "Luar Biasa!";
                emoji = "🔥";
            } else if (percentage >= 70) {
                predicate = "Bagus!";
                emoji = "🌟";
            } else if (percentage >= 60) {
                predicate = "Cukup Baik";
                emoji = "👍";
            } else if (percentage >= 50) {
                predicate = "Lumayan";
                emoji = "😁";
            } else {
                predicate = "Waduh, Perlu Belajar Lagi";
                emoji = "😅";
            }

            document.querySelector('.app').innerHTML = `
            <div class="result-container">
                <div class="result-emoji">${emoji}</div>
                <div class="result-score">${score}</div>
                <div class="result-predicate">${predicate}</div>

                <div class="result-stats">
                    <div class="stat-box">
                        <div class="stat-label">Benar</div>
                        <div class="stat-value" style="color: var(--success);">✔️ ${correctAnswers}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Salah</div>
                        <div class="stat-value" style="color: var(--danger);">✖️ ${wrongAnswers}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Tidak Dijawab</div>
                        <div class="stat-value" style="color: var(--warning);">❓ ${unanswered}</div>
                    </div>
                </div>

                <div class="result-stats">
                    <div class="stat-box">
                        <div class="stat-label">Total Soal</div>
                        <div class="stat-value">📌 ${totalQuestions}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Persentase</div>
                        <div class="stat-value">📊 ${percentage}%</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Waktu</div>
                        <div class="stat-value">⏱️ ${minutes}:${seconds.toString().padStart(2, '0')}</div>
                    </div>
                </div>

                <div class="result-buttons">
                    <a href="lesson.html?level=${level}" class="btn btn-primary">🔄 Ulangi Level</a>
                    <a href="index.html" class="btn btn-secondary">🏠 Kembali</a>
                </div>
            </div>
            `;
        }

        initNavGrid();
        loadQuestion();
        startTimer();
    </script>
